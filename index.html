<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小步美學｜美業計算機</title>
    <style>
        :root {
            --bg-color: #F7EFE5;
            --panel-color: #FFFDF9;
            --btn-main: #EADBC8;
            --btn-accent: #DAC0A3;
            --text-color: #5C4D43;
            --tab-active: #C19A6B;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'PingFang TC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .calculator {
            background: var(--panel-color);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(92, 77, 67, 0.08);
            width: 100%;
            max-width: 360px;
            border: 1px solid rgba(218, 192, 163, 0.3);
        }
        .title {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 2px;
            color: #8C7A6B;
        }
        .screen {
            background: #ffffff;
            padding: 15px;
            border-radius: 16px;
            text-align: right;
            margin-bottom: 15px;
            border: 1px solid rgba(92, 77, 67, 0.1);
        }
        .history { font-size: 13px; color: #A69485; min-height: 18px; word-break: break-all; }
        .result { font-size: 34px; font-weight: bold; margin-top: 5px; color: #6F5E53; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; background: #F0E6DB; border: none; padding: 10px;
            font-size: 14px; border-radius: 10px; cursor: pointer; color: var(--text-color); font-weight: bold;
        }
        .tab-btn.active { background: var(--tab-active); color: white; }
        .menu-section { display: none; flex-direction: column; gap: 12px; }
        .menu-section.active { display: flex; }
        .section-title {
            font-size: 13px; font-weight: bold; color: #A68A78;
            border-left: 3px solid var(--tab-active); padding-left: 6px; margin: 5px 0 2px 0;
        }
        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-group-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .slider-container { background: #FDFBF7; padding: 8px; border-radius: 12px; border: 1px dashed var(--btn-accent); }
        .slider-title { font-size: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .scroll-box { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
        .scroll-box button { flex: 0 0 auto; padding: 8px 12px; font-size: 13px; background: #F3ECE4; }
        button {
            background: var(--btn-main); border: none; padding: 12px 8px; border-radius: 12px;
            font-size: 15px; font-weight: 500; color: var(--text-color); cursor: pointer; transition: all 0.1s; -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.95); filter: brightness(0.92); }
        .calc-pad {
            margin-top: 15px; border-top: 1px solid rgba(92, 77, 67, 0.1); padding-top: 15px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
        }
        .btn-operator { background: var(--btn-accent); font-weight: bold; }
        .btn-clear { background: #E8D3D3; color: #A65252; }
        .copy-receipt-btn {
            grid-column: span 4; background: #C19A6B; color: white; font-weight: bold;
            margin-top: 10px; padding: 14px; border-radius: 14px; font-size: 16px; letter-spacing: 1px;
        }
        .copy-receipt-btn:active { background: #A88153; }
    </style>
</head>
<body>
<div class="calculator">
    <div class="title">小步美學 STEP BY STEP</div>
    <div class="screen">
        <div class="history" id="history"></div>
        <div class="result" id="result">0</div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('hand')">手部凝膠</button>
        <button class="tab-btn" onclick="switchTab('foot')">足部凝膠</button>
        <button class="tab-btn" onclick="switchTab('presson')">穿戴甲</button>
    </div>
    <div id="hand-section" class="menu-section active">
        <div class="section-title">基礎與造型</div>
        <div class="btn-group">
            <button onclick="addItem('手部單色', 490, 'hand')">手部單色 $490</button>
            <button onclick="addItem('鏡面/貓眼/亮片/漸層', 690, 'hand')">鏡面/貓眼/亮片/漸層 $690</button>
        </div>
        <div class="slider-container">
            <div class="slider-title"><span>造型款 (客帶圖可選金額)</span><span style="color:var(--tab-active); font-weight:bold;">$690 - $990</span></div>
            <div class="scroll-box">
                <button onclick="addItem('造型款', 690, 'hand')">$690</button>
                <button onclick="addItem('造型款', 740, 'hand')">$740</button>
                <button onclick="addItem('造型款', 790, 'hand')">$790</button>
                <button onclick="addItem('造型款', 840, 'hand')">$840</button>
                <button onclick="addItem('造型款', 880, 'hand')">$890</button>
                <button onclick="addItem('造型款', 940, 'hand')">$940</button>
                <button onclick="addItem('造型款', 990, 'hand')">$990</button>
            </div>
        </div>
        <div class="section-title">延甲、卸甲服務</div>
        <div class="btn-group-3">
            <button onclick="addItem('延甲一隻', 50, 'hand')">延甲一隻 $50</button>
            <button onclick="addItem('他店續卸', 150, 'hand')">他店續卸 $150</button>
            <button onclick="addItem('手純卸甲', 300, 'hand')">手純卸甲 $300</button>
        </div>
    </div>
    <div id="foot-section" class="menu-section">
        <div class="section-title">基礎與造型</div>
        <div class="btn-group">
            <button onclick="addItem('足部單色', 590, 'foot')">足部單色 $590</button>
            <button onclick="addItem('鏡面/貓眼/亮片/漸層', 790, 'foot')">鏡面/貓眼/亮片/漸層 $790</button>
        </div>
        <div class="slider-container">
            <div class="slider-title"><span>造型款 (足部多$100可選金額)</span><span style="color:var(--tab-active); font-weight:bold;">$790 - $1090</span></div>
            <div class="scroll-box">
                <button onclick="addItem('造型款', 790, 'foot')">$790</button>
                <button onclick="addItem('造型款', 840, 'foot')">$840</button>
                <button onclick="addItem('造型款', 890, 'foot')">$890</button>
                <button onclick="addItem('造型款', 940, 'foot')">$940</button>
                <button onclick="addItem('造型款', 990, 'foot')">$990</button>
                <button onclick="addItem('造型款', 1040, 'foot')">$1040</button>
                <button onclick="addItem('造型款', 1090, 'foot')">$1090</button>
            </div>
        </div>
        <div class="section-title">卸甲服務 (足部無延甲)</div>
        <div class="btn-group">
            <button onclick="addItem('他店續卸', 250, 'foot')">他店續卸 $250</button>
            <button onclick="addItem('足純卸甲', 400, 'foot')">足純卸甲 $400</button>
        </div>
    </div>
    <div id="presson-section" class="menu-section">
        <div class="section-title">穿戴甲服務</div>
        <div class="btn-group-3">
            <button onclick="addItem('不分款', 390, 'presson')">不分款 $390</button>
            <button onclick="addItem('店內貼', 100, 'presson')">店內貼 $100</button>
            <button onclick="addItem('純貼(自備)', 100, 'presson')">純貼(自備) $100</button>
        </div>
    </div>
    <div class="calc-pad">
        <button class="btn-clear" onclick="clearScreen()">AC</button><button class="btn-operator" onclick="appendOperator('/')">÷</button><button class="btn-operator" onclick="appendOperator('*')">×</button><button class="btn-operator" onclick="appendOperator('-')">-</button>
        <button onclick="appendNum('7')">7</button><button onclick="appendNum('8')">8</button><button onclick="appendNum('9')">9</button><button class="btn-operator" onclick="appendOperator('+')">+</button>
        <button onclick="appendNum('4')">4</button><button onclick="appendNum('5')">5</button><button onclick="appendNum('6')">6</button><button class="btn-operator" style="grid-row: span 2; height: 100%;" onclick="calculate()">=</button>
        <button onclick="appendNum('1')">1</button><button onclick="appendNum('2')">2</button><button onclick="appendNum('3')">3</button>
        <button style="grid-column: span 2;" onclick="appendNum('0')">0</button><button onclick="appendNum('.')">.</button>
        <button class="copy-receipt-btn" id="copyBtn" onclick="copyReceipt()">📋 複製客人明細</button>
    </div>
</div>
<script>
    let currentInput = ''; 
    let receiptData = { hand: {}, foot: {}, presson: {} };
    let currentTab = 'hand';
    const resultDiv = document.getElementById('result'); 
    const historyDiv = document.getElementById('history');
    const copyBtn = document.getElementById('copyBtn');

    const tabNamesMap = { hand: '手部凝膠', foot: '足部凝膠', presson: '穿戴甲' };

    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.menu-section').forEach(sec => sec.classList.remove('active'));
        window.event.target.classList.add('active'); 
        document.getElementById(tabName + '-section').classList.add('active');
        currentTab = tabName;
    }

    function addItem(name, price, type) {
        if (!receiptData[type][name]) {
            receiptData[type][name] = { price: price, count: 0 };
        }
        receiptData[type][name].count += 1;
        
        if (currentInput === '0' || currentInput === '') {
            currentInput = price.toString();
        } else {
            const lastChar = currentInput.trim().slice(-1);
            if (!isNaN(lastChar) && lastChar !== '') {
                currentInput += ' + ' + price;
            } else {
                currentInput += ' ' + price;
            }
        }
        updateScreen();
    }

    function appendNum(val) {
        if (currentInput === '0' && val !== '.') currentInput = '';
        currentInput += val;
        updateScreen();
    }

    function appendOperator(op) {
        if (currentInput === '') return;
        if ([' + ', ' - ', ' * ', ' / '].some(el => currentInput.endsWith(el))) { 
            currentInput = currentInput.slice(0, -3); 
        }
        currentInput += ' ' + op + ' ';
        updateScreen();
    }

    function updateScreen() {
        resultDiv.innerText = currentInput.replace(/\*/g, '×').replace(/\//g, '÷');
    }

    function clearScreen() { 
        currentInput = ''; 
        resultDiv.innerText = '0'; 
        historyDiv.innerText = ''; 
        receiptData = { hand: {}, foot: {}, presson: {} };
        copyBtn.innerText = '📋 複製客人明細';
    }

    function calculate() {
        try {
            if (currentInput === '') return;
            let displayInput = currentInput.replace(/\*/g, '×').replace(/\//g, '÷'); 
            historyDiv.innerText = displayInput + ' =';
            let res = eval(currentInput); 
            res = Math.round(res * 100) / 100; 
            resultDiv.innerText = res; 
            currentInput = res.toString();
        } catch (error) { 
            resultDiv.innerText = '錯誤'; 
            currentInput = ''; 
        }
    }

    function copyReceipt() {
        calculate();
        const total = resultDiv.innerText;
        
        let hasData = false;
        let text = '✨ 【小步美學】 ✨\n';
        text += '────────────────\n\n';
        
        for (let type in receiptData) {
            if (Object.keys(receiptData[type]).length > 0) {
                hasData = true;
                text += `∞ ${tabNamesMap[type]}\n`;
                for (let name in receiptData[type]) {
                    let item = receiptData[type][name];
                    text += `  ▫️ ${name} x${item.count}: $${item.price * item.count}\n`;
                }
                text += '\n';
            }
        }
        
        if (!hasData) {
            alert('請先點選服務項目再複製喔！');
            return;
        }
        
        text += '────────────────\n';
        text += `💰 總計: $${total}`;
        
        navigator.clipboard.writeText(text).then(() => {
            copyBtn.innerText = '✅ 已複製明細！';
            setTimeout(() => { copyBtn.innerText = '📋 複製客人明細'; }, 2000);
        }).catch(err => {
            alert('複製失敗，請手動全選複製');
        });
    }
</script>
</body>
</html>
