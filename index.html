<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小步美學｜專業排班金額計算機</title>
    <style>
        :root {
            --bg-color: #F7EFE5;
            --panel-color: #FFFDF9;
            --btn-main: #EADBC8;
            --btn-accent: #DAC0A3;
            --text-color: #5C4D43;
            --tab-active: #C19A6B;
        }
        
        html, body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-color);
            font-family: 'PingFang TC', sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 10px 10px 80px 10px;
            box-sizing: border-box;
        }

        .calculator {
            background: var(--panel-color);
            padding: 15px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(92, 77, 67, 0.08);
            width: 100%;
            max-width: 360px;
            border: 1px solid rgba(218, 192, 163, 0.3);
        }

        .title {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: #8C7A6B;
        }

        .screen {
            background: #ffffff;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(92, 77, 67, 0.1);
        }
        
        .time-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
        }
        .time-tab-btn {
            flex: 1;
            background: #FAF6F0;
            border: 1px solid rgba(193, 154, 107, 0.3);
            padding: 8px 6px;
            font-size: 13px;
            border-radius: 10px;
            cursor: pointer;
            color: #7A695C;
            font-weight: bold;
            transition: all 0.2s;
        }
        .time-tab-btn.active {
            background: var(--tab-active);
            border-color: var(--tab-active);
            color: white;
        }

        .time-box {
            background: #FAF6F0;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            color: #5C4D43;
            text-align: left;
            line-height: 1.6;
            border: 1px solid rgba(193, 154, 107, 0.25);
            display: none;
        }
        .time-box.active {
            display: block;
        }

        .start-input-area {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--tab-active);
            font-size: 14px;
        }
        .start-input-area input {
            border: 1px solid var(--btn-accent);
            border-radius: 6px;
            padding: 2px 5px;
            font-family: inherit;
            color: var(--text-color);
            background: #fff;
            font-size: 14px;
        }
        .result-title {
            font-weight: bold;
            color: #8C7A6B;
            margin-top: 8px;
            margin-bottom: 4px;
            font-size: 14px;
            border-bottom: 1px dashed rgba(193, 154, 107, 0.3);
            padding-bottom: 3px;
        }
        .result-item {
            margin-bottom: 6px;
            padding-left: 4px;
        }
        .result-item-name {
            color: #5C4D43;
        }
        .result-item-time {
            color: #A88153;
            font-weight: bold;
            font-size: 13px;
            padding-left: 20px;
        }
        .time-highlight {
            color: #A65252;
            font-weight: bold;
        }

        .history { text-align: right; font-size: 13px; color: #A69485; min-height: 18px; word-break: break-all; }
        .result { text-align: right; font-size: 28px; font-weight: bold; margin-top: 3px; color: #6F5E53; }
        
        .menu-section { display: none; flex-direction: column; gap: 10px; margin-top: 5px;}
        .menu-section.active { display: flex; }
        
        .section-title {
            font-size: 13px; font-weight: bold; color: #A68A78;
            border-left: 3px solid var(--tab-active); padding-left: 6px; margin: 6px 0 4px 0;
        }
        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-group-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn-promo-style { background: #E6D5C3; border: 1px dashed var(--tab-active); font-weight: bold; padding: 13px 5px; }
        .slider-container { background: #FDFBF7; padding: 10px 8px; border-radius: 12px; border: 1px dashed var(--btn-accent); }
        .slider-title { font-size: 13px; font-weight: bold; color: #A68A78; margin-bottom: 6px; }
        .scroll-box { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .scroll-box button { padding: 10px 0; font-size: 13px; background: #F3ECE4; text-align: center; }
        
        button {
            background: var(--btn-main); border: none; padding: 12px 6px; border-radius: 12px;
            font-size: 13px; font-weight: 500; color: var(--text-color); cursor: pointer; transition: all 0.1s; -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.95); filter: brightness(0.92); }
        
        .calc-pad {
            border-top: 1px solid rgba(92, 77, 67, 0.1); padding-top: 12px; margin-top: 12px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
        }
        .btn-operator { background: var(--btn-accent); font-weight: bold; }
        .btn-clear { background: #E8D3D3; color: #A65252; font-weight: bold; }
        .btn-reset-all { background: #D3E2E8; color: #3A6B7F; font-weight: bold; grid-column: span 2; }
        .copy-receipt-btn {
            grid-column: span 4; background: #C19A6B; color: white; font-weight: bold;
            margin-top: 6px; padding: 13px; border-radius: 14px; font-size: 15px; letter-spacing: 1px;
        }
        .copy-receipt-btn:active { background: #A88153; }
    </style>
</head>
<body>
<div class="calculator">
    <div class="title">小步美學 STEP BY STEP</div>
    
    <div class="screen">
        <div class="time-tabs">
            <button class="time-tab-btn active" id="time-tab-hand" onclick="globalSwitch('hand')">💅 手部服務看板</button>
            <button class="time-tab-btn" id="time-tab-foot" onclick="globalSwitch('foot')">🦶 足部服務看板</button>
            <button class="time-tab-btn" id="time-tab-presson" onclick="globalSwitch('presson')">🛍️ 穿戴甲看板</button>
        </div>
        
        <div class="time-box active" id="timeBox-hand">
            <div class="start-input-area">
                ⏰ 開始時間：<input type="time" id="startTime-hand" value="13:30" onchange="formatTimeDisplay()">
            </div>
            <div id="timeDetails-hand">請先在下方點選項目...</div>
        </div>
        
        <div class="time-box" id="timeBox-foot">
            <div class="start-input-area">
                ⏰ 開始時間：<input type="time" id="startTime-foot" value="13:30" onchange="formatTimeDisplay()">
            </div>
            <div id="timeDetails-foot">請先在下方點選項目...</div>
        </div>

        <div class="time-box" id="timeBox-presson">
            <div id="timeDetails-presson">請先在下方點選項目...</div>
        </div>
        
        <div class="history" id="history"></div>
        <div class="result" id="result">0</div>
    </div>

    <div id="hand-section" class="menu-section active">
        <div class="section-title">基礎款式</div>
        <div class="btn-group">
            <button onclick="addSmartService('手部單色', 490, 90, 120, 120, 150, 'hand', '基本施作（單色）')">單色 $490</button>
            <button onclick="addSmartService('鏡面/貓眼/亮片/漸層', 690, 180, 210, 210, 240, 'hand', '基本施作（簡單款）')">貓眼/漸層 $690</button>
        </div>
        <div class="btn-group" style="grid-template-columns: 1fr;">
            <button class="btn-promo-style" onclick="addSmartService('當月特惠款', 899, 180, 210, 210, 240, 'hand', '基本施作（特惠款）')">✨ 當月特惠款 $899 ✨</button>
        </div>
        <div class="slider-container">
            <div class="slider-title">帶圖款式</div>
            <div class="scroll-box">
                <button onclick="addSmartService('帶圖款式', 690, 210, 240, 210, 240, 'hand', '基本施作（複雜款）')">$690</button>
                <button onclick="addSmartService('帶圖款式', 790, 210, 240, 210, 240, 'hand', '基本施作（複雜款）')">$790</button>
                <button onclick="addSmartService('帶圖款式', 890, 210, 240, 210, 240, 'hand', '基本施作（複雜款）')">$890</button>
                <button onclick="addSmartService('帶圖款式', 990, 210, 240, 210, 240, 'hand', '基本施作（複雜款）')">$990</button>
            </div>
        </div>
        <div class="section-title">額外加項目服務</div>
        <div class="btn-group-3">
            <button onclick="addAddon('延甲一隻', 50, 15, 15, 'hand', '延甲一隻')">延甲1隻</button>
            <button onclick="addAddon('他店續卸', 150, 25, 25, 'hand', '他店續卸', true)">他店續卸</button>
            <button onclick="addAddon('手純卸甲', 300, 45, 45, 'hand', '手純卸甲', true)">手純卸甲 $300</button>
        </div>
    </div>

    <div id="foot-section" class="menu-section">
        <div class="section-title">基礎與造型</div>
        <div class="btn-group">
            <button onclick="addSmartService('足部單色', 590, 90, 120, 120, 150, 'foot', '基本施作（單色）')">單色 $590</button>
            <button onclick="addSmartService('鏡面/貓眼/亮片/漸層', 790, 180, 210, 210, 240, 'foot', '基本施作（簡單款）')">貓眼/漸層 $790</button>
        </div>
        <div class="section-title">額外加項目服務</div>
        <div class="btn-group">
            <button onclick="addAddon('他店續卸', 250, 25, 25, 'foot', '他店續卸', true)">他店續卸</button>
            <button onclick="addAddon('足純卸甲', 400, 45, 45, 'foot', '足純卸甲', true)">足純卸甲 $400</button>
        </div>
    </div>

    <div id="presson-section" class="menu-section">
        <div class="section-title">穿戴甲服務</div>
        <div class="btn-group-3">
            <button onclick="addServiceDirect('不分款', 390, 'presson', '穿戴甲不分款')">不分款 $390</button>
            <button onclick="addServiceDirect('店內貼', 100, 'presson', '店內貼')">店內貼 $100</button>
            <button onclick="addServiceDirect('純貼(自備)', 100, 'presson', '純貼(自備)')">純貼(自備) $100</button>
        </div>
    </div>

    <div class="calc-pad">
        <button class="btn-reset-all" onclick="clearScreen()">🔄 清除全部</button>
        <button class="btn-clear" onclick="backspaceClick()">刪除</button>
        <button class="btn-operator" onclick="appendOperator('/')">÷</button>
        
        <button onclick="appendNum('7')">7</button><button onclick="appendNum('8')">8</button><button onclick="appendNum('9')">9</button><button class="btn-operator" onclick="appendOperator('*')">×</button>
        <button onclick="appendNum('4')">4</button><button onclick="appendNum('5')">5</button><button onclick="appendNum('6')">6</button><button class="btn-operator" onclick="appendOperator('-')">-</button>
        <button onclick="appendNum('1')">1</button><button onclick="appendNum('2')">2</button><button onclick="appendNum('3')">3</button><button class="btn-operator" onclick="appendOperator('+')">+</button>
        <button style="grid-column: span 2;" onclick="appendNum('0')">0</button><button onclick="appendNum('.')">.</button><button class="btn-operator" onclick="calculate()">=</button>
        
        <button class="copy-receipt-btn" id="copyBtn" onclick="copyReceipt()">📋 複製客人明細</button>
    </div>
</div>

<script>
    let currentInput = ''; 
    let receiptData = { hand: {}, foot: {}, presson: {} };
    let currentActiveTab = 'hand'; 
    
    // 儲存已點選的服務
    let selectedServices = { hand: [], foot: [] };
    let selectedAddons = { hand: [], foot: [] };
    let pressonItems = [];

    const resultDiv = document.getElementById('result'); 
    const historyDiv = document.getElementById('history');
    const copyBtn = document.getElementById('copyBtn');
    const tabNamesMap = { hand: '手部凝膠', foot: '足部凝膠', presson: '穿戴甲' };

    function globalSwitch(targetTab) {
        currentActiveTab = targetTab;
        document.querySelectorAll('.time-tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.time-box').forEach(box => box.classList.remove('active'));
        document.getElementById('time-tab-' + targetTab).classList.add('active');
        document.getElementById('timeBox-' + targetTab).classList.add('active');
        document.querySelectorAll('.menu-section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(targetTab + '-section').classList.add('active');
    }

    function addSmartService(name, price, noRemoveMin, noRemoveMax, needRemoveMin, needRemoveMax, type, displayName) {
        if (!receiptData[type][name]) {
            receiptData[type][name] = { price: price, count: 0 };
        }
        receiptData[type][name].count += 1;

        selectedServices[type].push({
            name: displayName,
            noRemoveMin: noRemoveMin,
            noRemoveMax: noRemoveMax,
            needRemoveMin: needRemoveMin,
            needRemoveMax: needRemoveMax
        });

        pushPriceToInput(price);
    }

    function addAddon(name, price, minMins, maxMins, type, displayName, isRemoval = false) {
        if (!receiptData[type][name]) {
            receiptData[type][name] = { price: price, count: 0 };
        }
        receiptData[type][name].count += 1;

        selectedAddons[type].push({
            name: displayName,
            min: minMins,
            max: maxMins,
            isRemoval: isRemoval
        });

        pushPriceToInput(price);
    }

    function addServiceDirect(name, price, type, displayName) {
        if (!receiptData[type][name]) {
            receiptData[type][name] = { price: price, count: 0 };
        }
        receiptData[type][name].count += 1;
        pressonItems.push({ name: displayName });
        pushPriceToInput(price);
    }

    function pushPriceToInput(price) {
        if (currentInput === '0' || currentInput === '') {
            currentInput = price.toString();
        } else {
            const lastChar = currentInput.trim().slice(-1);
            if (!isNaN(lastChar) && lastChar !== '') {
                currentInput += ' + ' + price;
            } else {
                currentInput += ' ' + price;
            }
        }
        updateScreen();
    }

    function appendNum(val) {
        if (currentInput === '0' && val !== '.') currentInput = '';
        currentInput += val;
        updateScreen();
    }

    function appendOperator(op) {
        if (currentInput === '') return;
        if ([' + ', ' - ', ' * ', ' / '].some(el => currentInput.endsWith(el))) { 
            currentInput = currentInput.slice(0, -3); 
        }
        currentInput += ' ' + op + ' ';
        updateScreen();
    }

    function updateScreen() {
        resultDiv.innerText = currentInput.replace(/\*/g, '×').replace(/\//g, '÷');
        formatTimeDisplay();
    }

    function minsToText(totalMins) {
        let hrs = Math.floor(totalMins / 60);
        let mins = totalMins % 60;
        if (hrs > 0) {
            return mins > 0 ? `${hrs}小時${mins}分鐘` : `${hrs}小時`;
        }
        return `${mins}分鐘`;
    }

    function addMinutesToTime(timeStr, minsToAdd) {
        let parts = timeStr.split(':');
        let hrs = parseInt(parts[0], 10);
        let mins = parseInt(parts[1], 10);
        let total = hrs * 60 + mins + minsToAdd;
        let finalHrs = Math.floor(total / 60) % 24;
        let finalMins = total % 60;
        return `${finalHrs.toString().padStart(2, '0')}:${finalMins.toString().padStart(2, '0')}`;
    }

    function formatTimeDisplay() {
        renderSmartTimeBox('hand');
        renderSmartTimeBox('foot');
        renderPressonBox();
    }

    function renderSmartTimeBox(type) {
        const targetDiv = document.getElementById('timeDetails-' + type);
        const startTimeIn = document.getElementById('startTime-' + type);
        
        if (selectedServices[type].length === 0 && selectedAddons[type].length === 0) {
            targetDiv.innerHTML = "請先在下方點選項目...";
            return;
        }

        const hasRemoval = selectedAddons[type].some(addon => addon.isRemoval === true);

        let html = `<div class="result-title">📋 施作內容</div>`;
        let totalMinMins = 0;
        let totalMaxMins = 0;

        selectedServices[type].forEach(item => {
            let useMin = hasRemoval ? item.needRemoveMin : item.noRemoveMin;
            let useMax = hasRemoval ? item.needRemoveMax : item.noRemoveMax;
            totalMinMins += useMin;
            totalMaxMins += useMax;

            let displayH = (useMin === useMax) ? `${useMin/60}小時` : `${useMin/60}～${useMax/60}H`;
            html += `<div class="result-item"><span class="result-item-name">✔ ${item.name}</span><br><span class="result-item-time">${displayH}</span></div>`;
        });

        selectedAddons[type].forEach(addon => {
            totalMinMins += addon.min;
            totalMaxMins += addon.max;
            let displayH = (addon.min === addon.max) ? `${addon.min/60}小時` : `${addon.min/60}～${addon.max/60}H`;
            html += `<div class="result-item"><span class="result-item-name">✔ ${addon.name}</span><br><span class="result-item-time">${displayH}</span></div>`;
        });

        html += `<div class="result-item"><span class="result-item-name">✔ 拍照</span><br><span class="result-item-time">10分鐘</span></div>`;
        html += `<div class="result-item"><span class="result-item-name">✔ 討論款式</span><br><span class="result-item-time">15分鐘</span></div>`;
        totalMinMins += 25; 
        totalMaxMins += 25;

        let startVal = startTimeIn.value || "13:30";
        let endMinTime = addMinutesToTime(startVal, totalMinMins);
        let endMaxTime = addMinutesToTime(startVal, totalMaxMins);

        html += `<div style="text-align:center; margin:5px 0; color:rgba(193, 154, 107, 0.3);">━━━━━━</div>`;
        html += `<div class="result-title">⏰ 總工時</div>`;
        html += `<div style="padding-left:4px; margin-bottom:6px;">最短：${minsToText(totalMinMins)}<br>最長：${minsToText(totalMaxMins)}</div>`;
        html += `<div class="result-title">🕐 完成時間</div>`;
        html += `<div style="padding-left:4px;">開始：${startVal}<br>最早：<span class="time-highlight">${endMinTime}</span><br>最晚：<span class="time-highlight">${endMaxTime}</span></div>`;
        
        targetDiv.innerHTML = html;
    }

    function renderPressonBox() {
        const targetDiv = document.getElementById('timeDetails-presson');
        if (pressonItems.length === 0) {
            targetDiv.innerHTML = "請先在下方點選項目...";
            return;
        }
        let html = `<div class="result-title">📋 購買清單</div>`;
        pressonItems.forEach(item => {
            html += `<div class="result-item"><span class="result-item-name">✔ ${item.name}</span></div>`;
        });
        targetDiv.innerHTML = html;
    }

    function backspaceClick() {
        if (currentInput.endsWith(' ')) {
            currentInput = currentInput.slice(0, -3);
        } else if (currentInput.length > 0) {
            currentInput = currentInput.slice(0, -1);
        }
        updateScreen();
    }

    function clearScreen() { 
        currentInput = ''; 
        resultDiv.innerText = '0'; 
        historyDiv.innerText = ''; 
        selectedServices = { hand: [], foot: [] };
        selectedAddons = { hand: [], foot: [] };
        pressonItems = [];
        receiptData = { hand: {}, foot: {}, presson: {} };
        document.getElementById('timeDetails-hand').innerHTML = "請先在下方點選項目...";
        document.getElementById('timeDetails-foot').innerHTML = "請先在下方點選項目...";
        document.getElementById('timeDetails-presson').innerHTML = "請先在下方點選項目...";
        copyBtn.innerText = '📋 複製客人明細';
    }

    function calculate() {
        try {
            if (currentInput === '') return;
            let displayInput = currentInput.replace(/\*/g, '×').replace(/\//g, '÷'); 
            historyDiv.innerText = displayInput + ' =';
            let res = eval(currentInput); 
            res = Math.round(res * 100) / 100; 
            resultDiv.innerText = res; 
            currentInput = res.toString();
        } catch (error) { 
            resultDiv.innerText = '錯誤'; 
            currentInput = ''; 
        }
    }

    function copyReceipt() {
        calculate();
        const total = resultDiv.innerText;
        let hasData = false;
        let text = '✨ 【小步美學】 ✨\n';
        text += '────────────────\n\n';
        for (let type in receiptData) {
            if (Object.keys(receiptData[type]).length > 0) {
                hasData = true;
                text += `∞ ${tabNamesMap[type]}\n`;
                for (let name in receiptData[type]) {
                    let item = receiptData[type][name];
                    text += `  ▫️ ${name} x${item.count}: $${item.price * item.count}\n`;
                }
                text += '\n';
            }
        }
        if (!hasData) {
            alert('請先點選服務項目再複製喔！');
            return;
        }
        text += '────────────────\n';
        text += `💰 總計: $${total}`;
        navigator.clipboard.writeText(text).then(() => {
            copyBtn.innerText = '✅ 已複製明細！';
            setTimeout(() => { copyBtn.innerText = '📋 複製客人明細'; }, 2000);
        }).catch(err => {
            alert('複製失敗，請手動全選複製');
        });
    }
</script>
</body>
</html>
