<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小步美學｜專業金額與時間計算機</title>
    <style>
        :root {
            --bg-color: #F7EFE5;
            --panel-color: #FFFDF9;
            --btn-main: #EADBC8;
            --btn-accent: #DAC0A3;
            --text-color: #5C4D43;
            --tab-active: #C19A6B;
            --time-btn-bg: #F3ECE4;
            --time-btn-active: #C19A6B;
        }
        
        html, body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-color);
            font-family: 'PingFang TC', sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 10px 10px 80px 10px;
            box-sizing: border-box;
        }

        .calculator {
            background: var(--panel-color);
            padding: 15px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(92, 77, 67, 0.08);
            width: 100%;
            max-width: 360px;
            border: 1px solid rgba(218, 192, 163, 0.3);
        }

        .title {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: #8C7A6B;
        }

        /* 頂部時間與計算機螢幕區 */
        .screen {
            background: #ffffff;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(92, 77, 67, 0.1);
        }
        
        .time-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
        }
        .time-tab-btn {
            flex: 1;
            background: #FAF6F0;
            border: 1px solid rgba(193, 154, 107, 0.3);
            padding: 8px 4px;
            font-size: 12px;
            border-radius: 10px;
            cursor: pointer;
            color: #7A695C;
            font-weight: bold;
            transition: all 0.2s;
        }
        .time-tab-btn.active {
            background: var(--tab-active);
            border-color: var(--tab-active);
            color: white;
        }

        .time-box {
            background: #FAF6F0;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 13px;
            color: #5C4D43;
            text-align: left;
            line-height: 1.5;
            border: 1px solid rgba(193, 154, 107, 0.25);
            display: none;
        }
        .time-box.active {
            display: block;
        }

        .start-input-area {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--tab-active);
            font-size: 13px;
        }
        .start-input-area input {
            border: 1px solid var(--btn-accent);
            border-radius: 6px;
            padding: 2px 5px;
            color: var(--text-color);
            background: #fff;
            font-size: 13px;
        }

        /* 時間選擇按鈕格子 */
        .time-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-top: 6px;
            margin-bottom: 8px;
        }
        .time-grid-3 button {
            background: var(--time-btn-bg);
            border: 1px solid rgba(193, 154, 107, 0.2);
            padding: 8px 3px;
            font-size: 11px;
            border-radius: 8px;
            color: var(--text-color);
            font-weight: 500;
        }
        .time-grid-3 button.selected {
            background: #C19A6B;
            color: white;
            border-color: #C19A6B;
            font-weight: bold;
        }
        
        .time-summary {
            background: #fff;
            padding: 8px;
            border-radius: 8px;
            border: 1px dashed rgba(193, 154, 107, 0.4);
            margin-top: 5px;
            font-size: 12px;
        }
        .time-highlight {
            color: #A65252;
            font-weight: bold;
        }

        /* 金額螢幕 */
        .history { text-align: right; font-size: 13px; color: #A69485; min-height: 18px; word-break: break-all; margin-top: 8px; border-top: 1px dashed rgba(92, 77, 67, 0.1); padding-top: 5px;}
        .result { text-align: right; font-size: 28px; font-weight: bold; margin-top: 3px; color: #6F5E53; }
        
        /* 下方服務項目看板區 */
        .menu-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        .menu-tab-btn {
            flex: 1;
            background: #FAF6F0;
            border: 1px solid rgba(193, 154, 107, 0.2);
            padding: 8px 4px;
            font-size: 13px;
            border-radius: 10px;
            cursor: pointer;
            color: #7A695C;
        }
        .menu-tab-btn.active {
            background: var(--btn-accent);
            color: #fff;
            font-weight: bold;
        }

        .menu-section { display: none; flex-direction: column; gap: 8px; }
        .menu-section.active { display: flex; }
        
        .section-title {
            font-size: 13px; font-weight: bold; color: #A68A78;
            border-left: 3px solid var(--tab-active); padding-left: 6px; margin: 4px 0 2px 0;
        }
        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .btn-group-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn-promo-style { background: #E6D5C3; border: 1px dashed var(--tab-active); font-weight: bold; padding: 10px 5px; }
        
        .slider-container { background: #FDFBF7; padding: 8px; border-radius: 12px; border: 1px dashed var(--btn-accent); }
        .slider-title { font-size: 12px; font-weight: bold; color: #A68A78; margin-bottom: 4px; }
        .scroll-box { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .scroll-box button { padding: 8px 0; font-size: 12px; background: #F3ECE4; text-align: center; }
        
        button {
            background: var(--btn-main); border: none; padding: 10px 4px; border-radius: 12px;
            font-size: 13px; font-weight: 500; color: var(--text-color); cursor: pointer; transition: all 0.1s; -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.95); filter: brightness(0.92); }
        
        /* 計算盤 */
        .calc-pad {
            border-top: 1px solid rgba(92, 77, 67, 0.1); padding-top: 10px; margin-top: 10px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
        }
        .btn-operator { background: var(--btn-accent); font-weight: bold; }
        .btn-clear { background: #E8D3D3; color: #A65252; font-weight: bold; }
        .btn-reset-all { background: #D3E2E8; color: #3A6B7F; font-weight: bold; grid-column: span 2; }
        .copy-receipt-btn {
            grid-column: span 4; background: #C19A6B; color: white; font-weight: bold;
            margin-top: 4px; padding: 12px; border-radius: 14px; font-size: 14px; letter-spacing: 1px;
        }
    </style>
</head>
<body>
<div class="calculator">
    <div class="title">小步美學 STEP BY STEP</div>
    
    <!-- 頂部獨立時間估算看板 -->
    <div class="screen">
        <div class="time-tabs">
            <button class="time-tab-btn active" id="t-tab-hand" onclick="switchTimeTab('hand')">💅 手部時間估算</button>
            <button class="time-tab-btn" id="t-tab-foot" onclick="switchTimeTab('foot')">🦶 足部時間估算</button>
        </div>
        
        <!-- 手部時間估算面板 -->
        <div class="time-box active" id="t-box-hand">
            <div class="start-input-area">
                ⏰ 開始時間：<input type="time" id="startTime-hand" value="13:30" onchange="calcTime('hand')">
            </div>
            <div class="slider-title">1. 選擇基礎款式工時：</div>
            <div class="time-grid-3">
                <button id="h-style-1" onclick="toggleStyle('hand', 1, 90, 120, 'h-style-1')">單色不卸甲</button>
                <button id="h-style-2" onclick="toggleStyle('hand', 2, 120, 150, 'h-style-2')">單色要卸甲</button>
                <button id="h-style-3" onclick="toggleStyle('hand', 3, 180, 210, 'h-style-3')">簡單不卸甲</button>
                <button id="h-style-4" onclick="toggleStyle('hand', 4, 210, 240, 'h-style-4')">簡單要卸甲</button>
                <button id="h-style-5" onclick="toggleStyle('hand', 5, 210, 240, 'h-style-5')">複雜不卸甲</button>
                <button id="h-style-6" onclick="toggleStyle('hand', 6, 240, 270, 'h-style-6')">複雜要卸甲</button>
            </div>
            <div class="slider-title">2. 額外項目加成 (可複選)：</div>
            <div class="time-grid-3">
                <button id="h-add-1" onclick="toggleAddon('hand', 'ext1', 15, 'h-add-1')">延甲(單隻)</button>
                <button id="h-add-2" onclick="toggleAddon('hand', 'ext2', 150, 'h-add-2')">延甲(全手)</button>
                <button id="h-add-3" onclick="toggleAddon('hand', 'ext3', 60, 'h-add-3')">卸不續(本)</button>
                <button id="h-add-4" onclick="toggleAddon('hand', 'ext4', 90, 'h-add-4')">卸不續(他)</button>
                <button id="h-add-5" class="selected" onclick="toggleAddon('hand', 'photo', 10, 'h-add-5')">拍照 10m</button>
                <button id="h-add-6" class="selected" onclick="toggleAddon('hand', 'discuss', 15, 'h-add-6')">討論 15m</button>
            </div>
            <div class="time-summary" id="summary-hand">請勾選上方項目計算工時...</div>
        </div>
        
        <!-- 足部時間估算面板 (已移除延甲) -->
        <div class="time-box" id="t-box-foot">
            <div class="start-input-area">
                ⏰ 開始時間：<input type="time" id="startTime-foot" value="13:30" onchange="calcTime('foot')">
            </div>
            <div class="slider-title">1. 選擇基礎款式工時：</div>
            <div class="time-grid-3">
                <button id="f-style-1" onclick="toggleStyle('foot', 1, 90, 120, 'f-style-1')">單色不卸甲</button>
                <button id="f-style-2" onclick="toggleStyle('foot', 2, 120, 150, 'f-style-2')">單色要卸甲</button>
                <button id="f-style-3" onclick="toggleStyle('foot', 3, 180, 210, 'f-style-3')">簡單不卸甲</button>
                <button id="f-style-4" onclick="toggleStyle('foot', 4, 210, 240, 'f-style-4')">簡單要卸甲</button>
                <button id="f-style-5" onclick="toggleStyle('foot', 5, 210, 240, 'f-style-5')">複雜不卸甲</button>
                <button id="f-style-6" onclick="toggleStyle('foot', 6, 240, 270, 'f-style-6')">複雜要卸甲</button>
            </div>
            <div class="slider-title">2. 額外項目加成 (可複選)：</div>
            <div class="time-grid-3">
                <button id="f-add-3" onclick="toggleAddon('foot', 'ext3', 60, 'f-add-3')">卸不續(本)</button>
                <button id="f-add-4" onclick="toggleAddon('foot', 'ext4', 90, 'f-add-4')">卸不續(他)</button>
                <button id="f-add-7" onclick="toggleAddon('foot', 'spa', 15, 'f-add-7')">✨去角質 15m</button>
                <button id="f-add-5" class="selected" onclick="toggleAddon('foot', 'photo', 10, 'f-add-5')">拍照 10m</button>
                <button id="f-add-6" class="selected" onclick="toggleAddon('foot', 'discuss', 15, 'f-add-6')">討論 15m</button>
            </div>
            <div class="time-summary" id="summary-foot">請勾選上方項目計算工時...</div>
        </div>

        <!-- 數字計算機顯示區域 -->
        <div class="history" id="history"></div>
        <div class="result" id="result">0</div>
    </div>

    <!-- 中間：切換下方的價目表看板 -->
    <div class="menu-tabs">
        <button class="menu-tab-btn active" id="m-tab-hand" onclick="switchMenuTab('hand')">💅 手部價目</button>
        <button class="menu-tab-btn" id="m-tab-foot" onclick="switchMenuTab('foot')">🦶 足部價目</button>
        <button class="menu-tab-btn" id="m-tab-presson" onclick="switchMenuTab('presson')">🛍️ 穿戴甲價目</button>
    </div>

    <!-- 手部價目區域 -->
    <div id="m-sec-hand" class="menu-section active">
        <div class="section-title">基礎款式</div>
        <div class="btn-group">
            <button onclick="addPrice('手部單色', 490)">單色 $490</button>
            <button onclick="addPrice('手部鏡面/貓眼/亮片/漸層', 690)">鏡面/貓眼/亮片/漸層 $690</button>
        </div>
        <div class="btn-group" style="grid-template-columns: 1fr;">
            <button class="btn-promo-style" onclick="addPrice('當月特惠款', 899)">✨ 當月特惠款 $899 ✨</button>
        </div>
        <div class="slider-container">
            <div class="slider-title">帶圖款式</div>
            <div class="scroll-box">
                <button onclick="addPrice('手部帶圖款', 690)">$690</button>
                <button onclick="addPrice('手部帶圖款', 790)">$790</button>
                <button onclick="addPrice('手部帶圖款', 890)">$890</button>
                <button onclick="addPrice('手部帶圖款', 990)">$990</button>
            </div>
        </div>
        <div class="section-title">額外加項目服務</div>
        <div class="btn-group-3">
            <button onclick="addPrice('延甲1隻', 50)">延甲1隻</button>
            <button onclick="addPrice('他店續卸', 150)">他店續卸</button>
            <button onclick="addPrice('手純卸甲', 300)">手純卸甲 $300</button>
        </div>
    </div>

    <!-- 足部價目區域 (已同步加入帶圖款式滑動選單) -->
    <div id="m-sec-foot" class="menu-section">
        <div class="section-title">基礎與造型</div>
        <div class="btn-group">
            <button onclick="addPrice('足部單色', 590)">單色 $590</button>
            <button onclick="addPrice('足部鏡面/貓眼/亮片/漸層', 790)">鏡面/貓眼/亮片/漸層 $790</button>
        </div>
        <div class="slider-container">
            <div class="slider-title">帶圖款式</div>
            <div class="scroll-box">
                <button onclick="addPrice('足部帶圖款', 690)">$690</button>
                <button onclick="addPrice('足部帶圖款', 790)">$790</button>
                <button onclick="addPrice('足部帶圖款', 890)">$890</button>
                <button onclick="addPrice('足部帶圖款', 990)">$990</button>
            </div>
        </div>
        <div class="section-title">額外加項目服務</div>
        <div class="btn-group">
            <button onclick="addPrice('他店續卸', 250)">他店續卸</button>
            <button onclick="addPrice('足純卸甲', 400)">足純卸甲 $400</button>
        </div>
    </div>

    <!-- 穿戴甲價目區域 -->
    <div id="m-sec-presson" class="menu-section">
        <div class="section-title">穿戴甲服務</div>
        <div class="btn-group-3">
            <button onclick="addPrice('穿戴甲不分款', 390)">不分款 $390</button>
            <button onclick="addPrice('店內貼', 100)">店內貼 $100</button>
            <button onclick="addPrice('純貼(自備)', 100)">純貼(自備) $100</button>
        </div>
    </div>

    <!-- 底部數字計算盤 -->
    <div class="calc-pad">
        <button class="btn-reset-all" onclick="clearAll()">🔄 清除全部</button>
        <button class="btn-clear" onclick="backspaceClick()">刪除</button>
        <button class="btn-operator" onclick="appendOperator('/')">÷</button>
        
        <button onclick="appendNum('7')">7</button><button onclick="appendNum('8')">8</button><button onclick="appendNum('9')">9</button><button class="btn-operator" onclick="appendOperator('*')">×</button>
        <button onclick="appendNum('4')">4</button><button onclick="appendNum('5')">5</button><button onclick="appendNum('6')">6</button><button class="btn-operator" onclick="appendOperator('-')">-</button>
        <button onclick="appendNum('1')">1</button><button onclick="appendNum('2')">2</button><button onclick="appendNum('3')">3</button><button class="btn-operator" onclick="appendOperator('+')">+</button>
        <button style="grid-column: span 2;" onclick="appendNum('0')">0</button><button onclick="appendNum('.')">.</button><button class="btn-operator" onclick="calculate()">=</button>
        
        <button class="copy-receipt-btn" id="copyBtn" onclick="copyReceipt()">📋 複製預約明細（純金額）</button>
    </div>
</div>

<script>
    // --- 計算機與帳目狀態 ---
    let currentInput = ''; 
    let receiptItems = []; 
    const resultDiv = document.getElementById('result'); 
    const historyDiv = document.getElementById('history');
    const copyBtn = document.getElementById('copyBtn');

    // --- 時間估算專用狀態 ---
    let timeState = {
        hand: { styleId: null, minMins: 0, maxMins: 0, addons: { photo: 10, discuss: 15 } },
        foot: { styleId: null, minMins: 0, maxMins: 0, addons: { photo: 10, discuss: 15 } }
    };

    window.onload = function() {
        calcTime('hand');
        calcTime('foot');
    };

    function switchTimeTab(tab) {
        document.querySelectorAll('[id^="t-tab-"]').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('[id^="t-box-"]').forEach(box => box.classList.remove('active'));
        document.getElementById('t-tab-' + tab).classList.add('active');
        document.getElementById('t-box-' + tab).classList.add('active');
    }

    function switchMenuTab(tab) {
        document.querySelectorAll('[id^="m-tab-"]').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('[id^="m-sec-"]').forEach(sec => sec.classList.remove('active'));
        document.getElementById('m-tab-' + tab).classList.add('active');
        document.getElementById('m-sec-' + tab).classList.add('active');
    }

    // --- 時間估算核心邏輯 ---
    function toggleStyle(type, id, min, max, btnId) {
        const state = timeState[type];
        if (state.styleId === id) {
            state.styleId = null;
            state.minMins = 0;
            state.maxMins = 0;
            document.getElementById(btnId).classList.remove('selected');
        } else {
            state.styleId = id;
            state.minMins = min;
            state.maxMins = max;
            document.querySelectorAll(`#t-box-${type} .time-grid-3:nth-of-type(1) button`).forEach(btn => btn.classList.remove('selected'));
            document.getElementById(btnId).classList.add('selected');
        }
        calcTime(type);
    }

    function toggleAddon(type, key, mins, btnId) {
        const state = timeState[type];
        if (state.addons[key] !== undefined) {
            delete state.addons[key];
            document.getElementById(btnId).classList.remove('selected');
        } else {
            state.addons[key] = mins;
            document.getElementById(btnId).classList.add('selected');
        }
        calcTime(type);
    }

    function calcTime(type) {
        const state = timeState[type];
        const summaryDiv = document.getElementById('summary-' + type);
        const startTimeIn = document.getElementById('startTime-' + type);
        
        let totalMin = state.minMins;
        let totalMax = state.maxMins;
        
        for (let key in state.addons) {
            totalMin += state.addons[key];
            totalMax += state.addons[key];
        }

        if (totalMin === 0) {
            summaryDiv.innerHTML = "請先點選上方的「款式工時」開始估算！";
            return;
        }

        let startVal = startTimeIn.value || "13:30";
        let endMinTime = addMinutesToTime(startVal, totalMin);
        let endMaxTime = addMinutesToTime(startVal, totalMax);

        summaryDiv.innerHTML = `
            ⌛ <b>預估總工時：</b>${minsToText(totalMin)} ～ ${minsToText(totalMax)}<br>
            ⏰ <b>時間軸：</b>${startVal} 開始 ➔ 最快 <span class="time-highlight">${endMinTime}</span> 完工 / 最慢 <span class="time-highlight">${endMaxTime}</span> 完工
        `;
    }

    function minsToText(totalMins) {
        let hrs = Math.floor(totalMins / 60);
        let mins = totalMins % 60;
        if (hrs > 0) {
            return mins > 0 ? `${hrs}H ${mins}m` : `${hrs}H`;
        }
        return `${mins}分鐘`;
    }

    function addMinutesToTime(timeStr, minsToAdd) {
        let parts = timeStr.split(':');
        let hrs = parseInt(parts[0], 10);
        let mins = parseInt(parts[1], 10);
        let total = hrs * 60 + mins + minsToAdd;
        let finalHrs = Math.floor(total / 60) % 24;
        let finalMins = total % 60;
        return `${finalHrs.toString().padStart(2, '0')}:${finalMins.toString().padStart(2, '0')}`;
    }

    // --- 價目表純算錢邏輯 ---
    function addPrice(name, price) {
        receiptItems.push({ name: name, price: price });
        if (currentInput === '0' || currentInput === '') {
            currentInput = price.toString();
        } else {
            const lastChar = currentInput.trim().slice(-1);
            if (!isNaN(lastChar) && lastChar !== '') {
                currentInput += ' + ' + price;
            } else {
                currentInput += ' ' + price;
            }
        }
        resultDiv.innerText = currentInput.replace(/\*/g, '×').replace(/\//g, '÷');
    }

    style = window.getComputedStyle || function() {};
    function appendNum(val) {
        if (currentInput === '0' && val !== '.') currentInput = '';
        currentInput += val;
        resultDiv.innerText = currentInput.replace(/\*/g, '×').replace(/\//g, '÷');
    }

    function appendOperator(op) {
        if (currentInput === '') return;
        if ([' + ', ' - ', ' * ', ' / '].some(el => currentInput.endsWith(el))) { 
            currentInput = currentInput.slice(0, -3); 
        }
        currentInput += ' ' + op + ' ';
        resultDiv.innerText = currentInput.replace(/\*/g, '×').replace(/\//g, '÷');
    }

    function backspaceClick() {
        if (currentInput.endsWith(' ')) {
            currentInput = currentInput.slice(0, -3);
        } else if (currentInput.length > 0) {
            currentInput = currentInput.slice(0, -1);
        }
        resultDiv.innerText = currentInput === '' ? '0' : currentInput.replace(/\*/g, '×').replace(/\//g, '÷');
    }

    function calculate() {
        try {
            if (currentInput === '') return;
            let displayInput = currentInput.replace(/\*/g, '×').replace(/\//g, '÷'); 
            historyDiv.innerText = displayInput + ' =';
            let res = eval(currentInput); 
            res = Math.round(res * 100) / 100; 
            resultDiv.innerText = res; 
            currentInput = res.toString();
        } catch (error) { 
            resultDiv.innerText = '錯誤'; 
            currentInput = ''; 
        }
    }

    function clearAll() { 
        currentInput = ''; 
        receiptItems = [];
        resultDiv.innerText = '0'; 
        historyDiv.innerText = ''; 
        copyBtn.innerText = '📋 複製預約明細（純金額）';
        
        document.querySelectorAll('.time-grid-3 button').forEach(btn => btn.classList.remove('selected'));
        timeState = {
            hand: { styleId: null, minMins: 0, maxMins: 0, addons: { photo: 10, discuss: 15 } },
            foot: { styleId: null, minMins: 0, maxMins: 0, addons: { photo: 10, discuss: 15 } }
        };
        document.getElementById('h-add-5').classList.add('selected');
        document.getElementById('h-add-6').classList.add('selected');
        document.getElementById('f-add-5').classList.add('selected');
        document.getElementById('f-add-6').classList.add('selected');
        calcTime('hand');
        calcTime('foot');
    }

    function copyReceipt() {
        calculate();
        if (receiptItems.length === 0) {
            alert('請先點選下方價目表項目再複製喔！');
            return;
        }
        let text = '✨ 【小步美學 預約明細】 ✨\n';
        text += '────────────────\n';
        receiptItems.forEach(item => {
            text += ` ▫️ ${item.name}: $${item.price}\n`;
        });
        text += '────────────────\n';
        text += `💰 總計金額: $${resultDiv.innerText}`;
        
        navigator.clipboard.writeText(text).then(() => {
            copyBtn.innerText = '✅ 已複製明細！';
            setTimeout(() => { copyBtn.innerText = '📋 複製預約明細（純金額）'; }, 2000);
        }).catch(err => {
            alert('複製失敗，請手動複製');
        });
    }
</script>
</body>
</html>
