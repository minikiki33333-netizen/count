<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小步美學｜排班時間金額計算機</title>
    <style>
        :root {
            --bg-color: #F7EFE5;
            --panel-color: #FFFDF9;
            --btn-main: #EADBC8;
            --btn-accent: #DAC0A3;
            --text-color: #5C4D43;
            --tab-active: #C19A6B;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'PingFang TC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .calculator {
            background: var(--panel-color);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(92, 77, 67, 0.08);
            width: 100%;
            max-width: 360px;
            border: 1px solid rgba(218, 192, 163, 0.3);
        }
        .title {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 2px;
            color: #8C7A6B;
        }
        .screen {
            background: #ffffff;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(92, 77, 67, 0.1);
        }
        .time-box {
            background: #FAF6F0;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            color: #7A695C;
            margin-bottom: 10px;
            text-align: left;
            line-height: 1.5;
            border: 1px solid rgba(193, 154, 107, 0.2);
        }
        .start-input-area {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--tab-active);
        }
        .start-input-area input {
            border: 1px solid var(--btn-accent);
            border-radius: 6px;
            padding: 2px 5px;
            font-family: inherit;
            color: var(--text-color);
            background: #fff;
        }
        .history { text-align: right; font-size: 13px; color: #A69485; min-height: 18px; word-break: break-all; }
        .result { text-align: right; font-size: 32px; font-weight: bold; margin-top: 5px; color: #6F5E53; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; background: #F0E6DB; border: none; padding: 10px;
            font-size: 14px; border-radius: 10px; cursor: pointer; color: var(--text-color); font-weight: bold;
        }
        .tab-btn.active { background: var(--tab-active); color: white; }
        .menu-section { display: none; flex-direction: column; gap: 12px; }
        .menu-section.active { display: flex; }
        .section-title {
            font-size: 13px; font-weight: bold; color: #A68A78;
            border-left: 3px solid var(--tab-active); padding-left: 6px; margin: 5px 0 2px 0;
        }
        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-group-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn-promo-style { background: #E6D5C3; border: 1px dashed var(--tab-active); font-weight: bold; }
        .slider-container { background: #FDFBF7; padding: 8px; border-radius: 12px; border: 1px dashed var(--btn-accent); }
        .slider-title { font-size: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .scroll-box { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .scroll-box button { padding: 8px 0; font-size: 13px; background: #F3ECE4; text-align: center; }
        button {
            background: var(--btn-main); border: none; padding: 12px 8px; border-radius: 12px;
            font-size: 14px; font-weight: 500; color: var(--text-color); cursor: pointer; transition: all 0.1s; -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.95); filter: brightness(0.92); }
        .calc-pad {
            margin-top: 15px; border-top: 1px solid rgba(92, 77, 67, 0.1); padding-top: 15px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
        }
        .btn-operator { background: var(--btn-accent); font-weight: bold; }
        .btn-clear { background: #E8D3D3; color: #A65252; }
        .copy-receipt-btn {
            grid-column: span 4; background: #C19A6B; color: white; font-weight: bold;
            margin-top: 10px; padding: 14px; border-radius: 14px; font-size: 16px; letter-spacing: 1px;
        }
        .copy-receipt-btn:active { background: #A88153; }
    </style>
</head>
<body>
<div class="calculator">
    <div class="title">小步美學 STEP BY STEP</div>
    <div class="screen">
        <!-- 專屬時間排班看板 -->
        <div class="time-box" id="timeBox">
            <div class="start-input-area">
                ⏰ 開始時間：<input type="time" id="startTime" value="13:30" onchange="formatTimeDisplay()">
            </div>
            <div id="timeDetails">請先點選項目計算時間...</div>
        </div>
        <div class="history" id="history"></div>
        <div class="result" id="result">0</div>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('hand')">手部凝膠</button>
        <button class="tab-btn" onclick="switchTab('foot')">足部凝膠</button>
        <button class="tab-btn" onclick="switchTab('presson')">穿戴甲</button>
    </div>

    <!-- 手部 section -->
    <div id="hand-section" class="menu-section active">
        <div class="section-title">基礎款式 (已分配不卸/要卸時長)</div>
        <div class="btn-group">
            <button onclick="addService('手部單色(不卸甲)', 490, 90, 120, 'hand', '基本施作（單色 不卸甲）')">單色(不卸) $490<br><span style="font-size:11px;color:#8C7A6B;">1.5-2H</span></button>
            <button onclick="addService('手部單色(要卸甲)', 490, 120, 150, 'hand', '基本施作（單色 要卸甲）')">單色(要卸) $490<br><span style="font-size:11px;color:#8C7A6B;">2-2.5H</span></button>
            <button onclick="addService('鏡面/貓眼/亮片/漸層(不卸甲)', 690, 180, 210, 'hand', '基本施作（簡單款 不卸甲）')">貓眼/漸層(不卸) $690<br><span style="font-size:11px;color:#8C7A6B;">3-3.5H</span></button>
            <button onclick="addService('鏡面/貓眼/亮片/漸層(要卸甲)', 690, 210, 240, 'hand', '基本施作（簡單款 要卸甲）')">貓眼/漸層(要卸) $690<br><span style="font-size:11px;color:#8C7A6B;">3.5-4H</span></button>
        </div>
        <div class="btn-group" style="grid-template-columns: 1fr;">
            <button class="btn-promo-style" onclick="addService('當月特惠款(不卸甲)', 899, 180, 210, 'hand', '基本施作（特惠款 不卸甲）')">✨ 當月特惠款(不卸) $899 (3-3.5H) ✨</button>
            <button class="btn-promo-style" onclick="addService('當月特惠款(要卸甲)', 899, 210, 240, 'hand', '基本施作（特惠款 要卸甲）')">✨ 當月特惠款(要卸) $899 (3.5-4H) ✨</button>
        </div>
        <div class="slider-container">
            <div class="slider-title"><span>帶圖款式 (不卸甲 3.5-4H)</span></div>
            <div class="scroll-box">
                <button onclick="addService('帶圖款式(不卸甲)', 690, 210, 240, 'hand', '基本施作（複雜款 不卸甲）')">$690</button>
                <button onclick="addService('帶圖款式(不卸甲)', 790, 210, 240, 'hand', '基本施作（複雜款 不卸甲）')">$790</button>
                <button onclick="addService('帶圖款式(不卸甲)', 890, 210, 240, 'hand', '基本施作（複雜款 不卸甲）')">$890</button>
                <button onclick="addService('帶圖款式(不卸甲)', 990, 210, 240, 'hand', '基本施作（複雜款 不卸甲）')">$990</button>
            </div>
            <div class="slider-title" style="margin-top:5px;"><span>帶圖款式 (要卸甲 4-4.5H)</span></div>
            <div class="scroll-box">
                <button onclick="addService('帶圖款式(要卸甲)', 690, 240, 270, 'hand', '基本施作（複雜款 要卸甲）')">$690</button>
                <button onclick="addService('帶圖款式(要卸甲)', 790, 240, 270, 'hand', '基本施作（複雜款 要卸甲）')">$790</button>
                <button onclick="addService('帶圖款式(要卸甲)', 890, 240, 270, 'hand', '基本施作（複雜款 要卸甲）')">$890</button>
                <button onclick="addService('帶圖款式(要卸甲)', 990, 240, 270, 'hand', '基本施作（複雜款 要卸甲）')">$990</button>
            </div>
        </div>
        <div class="section-title">額外加項目服務</div>
        <div class="btn-group-3">
            <button onclick="addService('延甲一隻', 50, 15, 15, 'hand', '延甲一隻')">延甲1隻<br>+15分</button>
            <button onclick="addService('全手延甲', 500, 150, 150, 'hand', '全手延甲')">全手延甲<br>+2.5H</button>
            <button onclick="addService('他店續卸', 150, 25, 25, 'hand', '他店續卸')">他店續卸<br>+25分</button>
        </div>
        <div class="btn-group">
            <button onclick="addService('手純卸甲', 300, 45, 45, 'hand', '手純卸甲')">手純卸甲 $300 (45分)</button>
        </div>
    </div>

    <!-- 足部 section -->
    <div id="foot-section" class="menu-section">
        <div class="section-title">基礎與造型</div>
        <div class="btn-group">
            <button onclick="addService('足部單色(不卸甲)', 590, 90, 120, 'foot', '基本施作（單色 不卸甲）')">單色(不卸) $590<br><span style="font-size:11px;color:#8C7A6B;">1.5-2H</span></button>
            <button onclick="addService('足部單色(要卸甲)', 590, 120, 150, 'foot', '基本施作（單色 要卸甲）')">單色(要卸) $590<br><span style="font-size:11px;color:#8C7A6B;">2-2.5H</span></button>
            <button onclick="addService('鏡面/貓眼/亮片/漸層(不卸)', 790, 180, 210, 'foot', '基本施作（簡單款 不卸甲）')">貓眼/漸層(不卸) $790<br><span style="font-size:11px;color:#8C7A6B;">3-3.5H</span></button>
            <button onclick="addService('鏡面/貓眼/亮片/漸層(要卸)', 790, 210, 240, 'foot', '基本施作（簡單款 要卸甲）')">貓眼/漸層(要卸) $790<br><span style="font-size:11px;color:#8C7A6B;">3.5-4H</span></button>
        </div>
        <div class="section-title">額外加項目服務</div>
        <div class="btn-group-3">
            <button onclick="addService('足部去角質', 0, 15, 15, 'foot', '足部去角質')">去角質<br>+15分</button>
            <button onclick="addService('他店續卸', 250, 25, 25, 'foot', '他店續卸')">他店續卸<br>+25分</button>
            <button onclick="addService('足純卸甲', 400, 45, 45, 'foot', '足純卸甲')">足純卸甲 $400</button>
        </div>
    </div>

    <!-- 穿戴甲 section -->
    <div id="presson-section" class="menu-section">
        <div class="section-title">穿戴甲服務</div>
        <div class="btn-group-3">
            <button onclick="addService('不分款', 390, 30, 30, 'presson', '穿戴甲不分款')">不分款 $390</button>
            <button onclick="addService('店內貼', 100, 15, 15, 'presson', '店內貼')">店內貼 $100</button>
            <button onclick="addService('純貼(自備)', 100, 15, 'presson', '純貼(自備)')">純貼(自備) $100</button>
        </div>
    </div>

    <!-- 計算盤 -->
    <div class="calc-pad">
        <button class="btn-clear" onclick="clearScreen()">AC</button><button class="btn-operator" onclick="appendOperator('/')">÷</button><button class="btn-operator" onclick="appendOperator('*')">×</button><button class="btn-operator" onclick="appendOperator('-')">-</button>
        <button onclick="appendNum('7')">7</button><button onclick="appendNum('8')">8</button><button onclick="appendNum('9')">9</button><button class="btn-operator" onclick="appendOperator('+')">+</button>
        <button onclick="appendNum('4')">4</button><button onclick="appendNum('5')">5</button><button onclick="appendNum('6')">6</button><button class="btn-operator" style="grid-row: span 2; height: 100%;" onclick="calculate()">=</button>
        <button onclick="appendNum('1')">1</button><button onclick="appendNum('2')">2</button><button onclick="appendNum('3')">3</button>
        <button style="grid-column: span 2;" onclick="appendNum('0')">0</button><button onclick="appendNum('.')">.</button>
        <button class="copy-receipt-btn" id="copyBtn" onclick="copyReceipt()">📋 複製客人明細</button>
    </div>
</div>

<script>
    let currentInput = ''; 
    let receiptData = { hand: {}, foot: {}, presson: {} };
    let currentTab = 'hand';
    
    // 用於追蹤點選項目的時間陣列
    let selectedTimeItems = [];

    const resultDiv = document.getElementById('result'); 
    const historyDiv = document.getElementById('history');
    const timeDetailsDiv = document.getElementById('timeDetails');
    const copyBtn = document.getElementById('copyBtn');
    const startTimeInput = document.getElementById('startTime');

    const tabNamesMap = { hand: '手部凝膠', foot: '足部凝膠', presson: '穿戴甲' };

    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.menu-section').forEach(sec => sec.classList.remove('active'));
        window.event.target.classList.add('active'); 
        document.getElementById(tabName + '-section').classList.add('active');
        currentTab = tabName;
    }

    function addService(name, price, minMins, maxMins, type, displayName) {
        if (!receiptData[type][name]) {
            receiptData[type][name] = { price: price, count: 0 };
        }
        receiptData[type][name].count += 1;
        
        // 紀錄時間明細
        selectedTimeItems.push({ name: displayName, min: minMins, max: maxMins });

        if (currentInput === '0' || currentInput === '') {
            currentInput = price.toString();
        } else {
            const lastChar = currentInput.trim().slice(-1);
            if (!isNaN(lastChar) && lastChar !== '') {
                currentInput += ' + ' + price;
            } else {
                currentInput += ' ' + price;
            }
        }
        updateScreen();
    }

    function appendNum(val) {
        if (currentInput === '0' && val !== '.') currentInput = '';
        currentInput += val;
        updateScreen();
    }

    function appendOperator(op) {
        if (currentInput === '') return;
        if ([' + ', ' - ', ' * ', ' / '].some(el => currentInput.endsWith(el))) { 
            currentInput = currentInput.slice(0, -3); 
        }
        currentInput += ' ' + op + ' ';
        updateScreen();
    }

    function updateScreen() {
        resultDiv.innerText = currentInput.replace(/\*/g, '×').replace(/\//g, '÷');
        formatTimeDisplay();
    }

    function minsToText(totalMins) {
        let hrs = Math.floor(totalMins / 60);
        let mins = totalMins % 60;
        if (hrs > 0) {
            return mins > 0 ? `${hrs} 小時 ${mins} 分` : `${hrs} 小時`;
        }
        return `${mins} 分鐘`;
    }

    function addMinutesToTime(timeStr, minsToAdd) {
        let parts = timeStr.split(':');
        let hrs = parseInt(parts[0], 10);
        let mins = parseInt(parts[1], 10);
        
        let total = hrs * 60 + mins + minsToAdd;
        let finalHrs = Math.floor(total / 60) % 24;
        let finalMins = total % 60;
        
        return `${finalHrs.toString().padStart(2, '0')}:${finalMins.toString().padStart(2, '0')}`;
    }

    function formatTimeDisplay() {
        if (selectedTimeItems.length === 0) {
            timeDetailsDiv.innerHTML = "請先點選項目計算時間...";
            return;
        }

        let html = "";
        let totalMinMins = 0;
        let totalMaxMins = 0;

        // 1. 輸出各個被點選項目的時間
        selectedTimeItems.forEach(item => {
            totalMinMins += item.min;
            totalMaxMins += item.max;
            if (item.min === item.max) {
                html += `▫️ ${item.name}<br><strong style="color:#A88153;">${minsToText(item.min)}</strong><br>`;
            } else {
                html += `▫️ ${item.name}<br><strong style="color:#A88153;">${item.min/60}～${item.max/60} 小時</strong><br>`;
            }
        });

        // 2. 固定加上拍照與討論
        html += `▫️ 拍照<br><strong style="color:#A88153;">10 分鐘</strong><br>`;
        html += `▫️ 討論款式<br><strong style="color:#A88153;">15 分鐘</strong><br>`;
        
        totalMinMins += 25; // 加 10 + 15
        totalMaxMins += 25;

        // 3. 計算總時間與完成時間
        let startVal = startTimeInput.value || "13:30";
        let endMinTime = addMinutesToTime(startVal, totalMinMins);
        let endMaxTime = addMinutesToTime(startVal, totalMaxMins);

        html += `<hr style="border:0; border-top:1px dashed #C19A6B; margin:8px 0;">`;
        html += `<strong>【總時間】</strong><br>`;
        html += `⏱️ 最短：${minsToText(totalMinMins)}<br>`;
        html += `⏱️ 最長：${minsToText(totalMaxMins)}<br>`;
        html += `🏁 開始：${startVal}<br>`;
        html += `✨ 最早完成：<span style="color:#A65252; font-weight:bold;">${endMinTime}</span><br>`;
        html += `✨ 最晚完成：<span style="color:#A65252; font-weight:bold;">${endMaxTime}</span>`;

        timeDetailsDiv.innerHTML = html;
    }

    function clearScreen() { 
        currentInput = ''; 
        resultDiv.innerText = '0'; 
        historyDiv.innerText = ''; 
        selectedTimeItems = [];
        receiptData = { hand: {}, foot: {}, presson: {} };
        timeDetailsDiv.innerHTML = "請先點選項目計算時間...";
        copyBtn.innerText = '📋 複製客人明細';
    }

    function calculate() {
        try {
            if (currentInput === '') return;
            let displayInput = currentInput.replace(/\*/g, '×').replace(/\//g, '÷'); 
            historyDiv.innerText = displayInput + ' =';
            let res = eval(currentInput); 
            res = Math.round(res * 100) / 100; 
            resultDiv.innerText = res; 
            currentInput = res.toString();
        } catch (error) { 
            resultDiv.innerText = '錯誤'; 
            currentInput = ''; 
        }
    }

    function copyReceipt() {
        calculate();
        const total = resultDiv.innerText;
        
        let hasData = false;
        let text = '✨ 【小步美學】 ✨\n';
        text += '────────────────\n\n';
        
        for (let type in receiptData) {
            if (Object.keys(receiptData[type]).length > 0) {
                hasData = true;
                text += `∞ ${tabNamesMap[type]}\n`;
                for (let name in receiptData[type]) {
                    let item = receiptData[type][name];
                    text += `  ▫️ ${name} x${item.count}: $${item.price * item.count}\n`;
                }
                text += '\n';
            }
        }
        
        if (!hasData) {
            alert('請先點選服務項目再複製喔！');
            return;
        }
        
        text += '────────────────\n';
        text += `💰 總計: $${total}`;
        
        navigator.clipboard.writeText(text).then(() => {
            copyBtn.innerText = '✅ 已複製明細！';
            setTimeout(() => { copyBtn.innerText = '📋 複製客人明細'; }, 2000);
        }).catch(err => {
            alert('複製失敗，請手動全選複製');
        });
    }
</script>
</body>
</html>
